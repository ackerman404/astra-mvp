services:
  - type: web
    name: astra-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:///./astra_backend.db
      - key: ADMIN_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.0"
